<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রিন্ট মিটার ম্যানেজার</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--primary:#2c3e50;--secondary:#3498db;--success:#27ae60;--warning:#f39c12;--danger:#e74c3c;--light:#f4f7f6;}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--light);margin:0;padding:20px;color:#333;}
        .container{max-width:1200px;margin:0 auto;background:#fff;padding:25px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
        h1{text-align:center;color:var(--primary);margin-bottom:15px;}
        .last-month-banner{background:linear-gradient(135deg,var(--primary),#34495e);color:white;border-radius:10px;padding:14px 22px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;box-shadow:0 3px 8px rgba(44,62,80,0.3);}
        .last-month-banner .lm-label{font-size:0.95em;opacity:0.85;}
        .last-month-banner .lm-value{font-size:1.6em;font-weight:bold;color:#2ecc71;}
        .last-month-banner .lm-name{font-size:0.85em;opacity:0.7;margin-top:2px;}
        .top-controls{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:15px;background:#eee;padding:10px;border-radius:8px;}
        .filter-group{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
        .data-tools{display:flex;gap:10px;}
        .input-card{background:#eef2f3;padding:20px;border-radius:8px;border-left:5px solid var(--secondary);margin-bottom:25px;}
        .input-row{display:flex;gap:15px;flex-wrap:wrap;align-items:flex-end;}
        .form-group{flex:1;min-width:200px;}
        label{display:block;margin-bottom:5px;font-weight:bold;font-size:0.9em;}
        input[type="text"],input[type="date"],input[type="number"]{width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;box-sizing:border-box;font-size:1em;}
        input[type="file"]{display:none;}
        button{cursor:pointer;border:none;border-radius:5px;font-weight:bold;transition:0.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;color:white;}
        button:hover{transform:translateY(-2px);opacity:0.9;}
        .btn-save{background:var(--secondary);padding:11px 25px;font-size:1em;height:42px;}
        .btn-today{background:var(--success);padding:10px 15px;}
        .btn-json-down{background:var(--primary);padding:10px 15px;}
        .btn-json-up{background:var(--warning);color:#333;padding:10px 15px;}
        .btn-debug{background:#333;padding:10px 15px;font-size:0.8em;}
        table{width:100%;border-collapse:collapse;margin-top:10px;background:#fff;}
        th,td{border:1px solid #eee;padding:12px;text-align:left;vertical-align:top;}
        th{background:var(--primary);color:white;font-weight:600;}
        tr:nth-child(even){background:#f9f9f9;}
        .sub-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px dashed #eee;}
        .sub-row:last-child{border-bottom:none;}
        .sub-info{display:flex;align-items:center;gap:8px;}
        .sub-actions{display:flex;gap:5px;}
        .icon-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.9em;transition:0.2s;color:white;}
        .icon-btn:hover{transform:scale(1.1);}
        .btn-add{background:var(--success);}
        .btn-edit{background:var(--warning);color:#333;}
        .btn-del{background:var(--danger);}
        .btn-pdf{background:var(--primary);}
        .btn-edit-main{background:#8e44ad;}
        .total-badge{background:var(--primary);color:white;padding:5px 10px;border-radius:4px;font-size:0.9em;font-weight:bold;}
        .time-text{font-size:0.8em;color:#7f8c8d;margin-left:5px;}
        .today-tag{background:var(--success);color:white;font-size:0.7em;padding:2px 6px;border-radius:10px;margin-left:5px;vertical-align:middle;}
        .empty-msg{text-align:center;color:#999;padding:20px;font-style:italic;}
        .status-bar{text-align:center;margin-bottom:15px;font-weight:bold;min-height:20px;}
        .msg-success{color:var(--success);}
        .msg-error{color:var(--danger);}
        .msg-info{color:var(--secondary);}
        #debugConsole{margin-top:20px;background:#222;color:#0f0;padding:15px;font-family:monospace;font-size:12px;height:200px;overflow-y:scroll;border-radius:5px;display:none;border:1px solid #444;}
        .log-error{color:#ff6b6b;}
        .log-info{color:#4ecdc4;}
        @media(max-width:768px){.top-controls{flex-direction:column;align-items:stretch;}.filter-group,.data-tools{justify-content:space-between;}.input-row{flex-direction:column;}.sub-row{flex-direction:column;align-items:flex-start;gap:5px;}.sub-actions{width:100%;justify-content:flex-end;}}
    </style>
</head><body>
<div class="container">
    <h1><i class="fas fa-print"></i> প্রিন্ট মিটার ম্যানেজার</h1>
    <h1> This System Design And Development by SOHAN</h1>
    <div class="last-month-banner">
        <div>
            <div class="lm-label"><i class="fas fa-calendar-alt"></i> চলতি মাসের মোট প্রিন্ট</div>
            <div class="lm-name" id="lastMonthName">—</div>
        </div>
        <div style="text-align:right">
            <div class="lm-value"><span id="lastMonthTotal">0.00</span> মিটার</div>
        </div>
    </div>
    <div id="statusBar" class="status-bar"></div>
    <div class="top-controls">
        <div class="filter-group">
            <label style="margin:0;">তারিখ:</label>
            <input type="date" id="filterDate" style="width:auto;" onchange="renderTable()">
            <button class="btn-today" onclick="setTodayFilter()"><i class="fas fa-calendar-day"></i> আজ</button>
        </div>
        <div class="data-tools">
            <button class="btn-debug" onclick="toggleDebug()"><i class="fas fa-bug"></i> Debug</button>
            <button class="btn-json-down" onclick="downloadJSON()"><i class="fas fa-file-download"></i> JSON</button>
            <button class="btn-json-up" onclick="document.getElementById('jsonFileInput').click()"><i class="fas fa-file-upload"></i> আপলোড</button>
            <input type="file" id="jsonFileInput" accept=".json" onchange="uploadJSON(this)">
        </div>
    </div>
    <div class="input-card">
        <h3 style="margin-top:0;">নতুন জব তৈরি করুন <span id="todayLabel" class="today-tag" style="display:none;">আজ</span></h3>
        <div class="input-row">
            <div class="form-group">
                <label>মেইন ফাইলের নাম</label>
                <input type="text" id="mainNameInput" placeholder="যেমন: Brochure Design">
            </div>
            <div class="form-group">
                <label>তারিখ</label>
                <input type="date" id="jobDateInput">
            </div>
            <div style="padding-bottom:1px;">
                <button class="btn-save" onclick="createJob()"><i class="fas fa-plus-circle"></i> তৈরি করুন</button>
            </div>
        </div>
    </div>
    <div style="overflow-x:auto;">
        <table id="dataTable">
            <thead>
                <tr>
                    <th width="18%">তারিখ ও সময়</th>
                    <th width="25%">মেইন ফাইল</th>
                    <th width="42%">সাব ফাইল সমূহ</th>
                    <th width="15%" style="text-align:center;">অ্যাকশন</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="4" class="empty-msg">ডাটা লোড হচ্ছে...</td></tr>
            </tbody>
        </table>
    </div>
    <div style="margin-top:20px;text-align:right;font-size:1.3em;border-top:2px solid #333;padding-top:10px;">
        মোট: <span id="grandTotal" style="color:var(--success);font-weight:bold;">0.00</span> মিটার
    </div>
    <div id="debugConsole"></div>
</div>
